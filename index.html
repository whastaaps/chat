<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta content='#fef6e9' name='theme-color' />
  <meta content='#fef6e9' name='apple-mobile-web-app-status-bar-style' />
  <meta content='yes' name='apple-mobile-web-app-capable' />
  <meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no'
    name='viewport' />
  <b:include data='blog' name='all-head-content' />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/favicon.ico" />
  <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
  <title>WhatsApp</title>

  <!-- SEO -->
  <meta name="description"
    content="Connect easily with friends and family using WhatsApp. Fast, simple, secure messaging and calling." />
  <meta name="keywords" content="WhatsApp, chat, messaging, video call, secure communication, landing page" />
  <meta name="robots" content="index,follow" />
  <meta name="revisit-after" content="1 days" />
  <meta name="revisit" content="always" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="WhatsApp" />
  <meta property="og:description" content="Fast, simple, and secure messaging for everyone." />
  <meta property="og:site_name" content="WhatsApp" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="en_GB" />
  <meta property="og:locale:alternate" content="id_ID" />
  <meta property="og:image" content="https://wa.hanapha.com/chat/assets/images/preview.jpg" />
  <meta property="og:url" content="https://wa.hanapha.com/chat/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="WhatsApp" />
  <meta name="twitter:description" content="Fast, simple, and secure messaging for everyone." />
  <meta name="twitter:image" content="https://wa.hanapha.com/chat/assets/images/preview.jpg" />
  <meta name="twitter:site" content="@WhatsApp" />
  <meta name="twitter:creator" content="@WhatsApp" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://hanapha.com/banner/popunder.js"></script>

</head>

<body>
  <div class="container-wa">
    <div class="wa-header">
      <div class="wa-header-left">
        <img id="img1" src="assets/images/1.jpg" alt="PP">
        <div>
          <div id="name1" class="name"></div>
          <div id="status1" class="status">online...</div>
        </div>
      </div>
      <div class="icons">
        <span class="material-icons">call</span>
        <span class="material-icons">videocam</span>
        <span class="material-icons">more_vert</span>
      </div>
    </div>

    <div id="chatBox" class="wa-content">
      <img id="img2" class="chat-img" src="assets/images/1.jpg" alt="Gambar">
      <div id="bubble1" class="bubble">
        <span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
      </div>
      <div id="bubble2" class="bubble instruction">
        <span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
      </div>
    </div>

    <div class="wa-input-bar">
      <span class="material-icons">emoji_emotions</span>
      <input id="chatInput" class="wa-input" placeholder="Ketik pesan...">
      <span class="material-icons">attach_file</span>
      <span class="material-icons">send</span>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
  <script src="https://hanapha.com/banner/socialbar.js"></script>

  <script>
    // Hanapha
    const API_KEY = "67eef21d47bd4f219d24e921b76d701f";
    window.addEventListener("load", function () {
      const url = encodeURIComponent(location.href);
      // Bing
      fetch(
        `https://api.indexnow.org/indexnow?url=${url}&key=${API_KEY}`
      );
      // Yandex
      fetch(
        `https://yandex.com/indexnow?url=${url}&key=${API_KEY}`
      );
      console.log("Submitted to Bing + Yandex");
    });
  </script>

</body>

</html>
